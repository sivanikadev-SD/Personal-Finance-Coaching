<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FinCoach</title>
    <meta name="description" content="Sign in to your FinCoach account to access your financial dashboard.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230F172A'/><polyline points='10,70 30,45 50,55 70,25 90,35' stroke='%2314B8A6' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='75,25 90,25 90,40' stroke='%2314B8A6' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="auth-wrapper">
        <!-- Left Visual Panel -->
        <div class="auth-visual">
            <a href="index.html" class="logo"><i class="fa-solid fa-chart-line"></i> FinCoach</a>
            <h2>Welcome Back!</h2>
            <p>Sign in to access your personalized financial dashboard, track your progress, and connect with your
                coach.</p>
        </div>

        <!-- Right Form Panel -->
        <div class="auth-form-side">
            <div class="auth-card animate-fade-in">
                <h2>Sign In</h2>
                <p class="auth-subtitle">Enter your credentials to continue</p>

                <!-- Social Login Buttons -->
                <div class="auth-social-btns">
                    <button class="auth-social-btn"><i class="fa-brands fa-google"></i> Google</button>
                    <button class="auth-social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
                </div>

                <div class="auth-separator">or continue with email</div>

                <form action="dashboard.html">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="••••••••">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" style="width: auto; accent-color: var(--accent);"> Remember me
                        </label>
                        <a href="#" style="color: var(--accent); font-weight: 500;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;"><i
                            class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                </form>

                <div class="auth-links">
                    <p>Don't have an account? <a href="register.html">Create one</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
