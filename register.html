<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - FinCoach</title>
    <meta name="description" content="Create your FinCoach account and start your journey to financial freedom.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230F172A'/><polyline points='10,70 30,45 50,55 70,25 90,35' stroke='%2314B8A6' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='75,25 90,25 90,40' stroke='%2314B8A6' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="auth-wrapper">
        <!-- Left Visual Panel -->
        <div class="auth-visual">
            <a href="index.html" class="logo"><i class="fa-solid fa-chart-line"></i> FinCoach</a>
            <h2>Start Your Journey</h2>
            <p>Create a free account to get access to personalized coaching, budgeting tools, and your own financial
                dashboard.</p>
        </div>

        <!-- Right Form Panel -->
        <div class="auth-form-side">
            <div class="auth-card animate-fade-in">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join 2,000+ people transforming their finances</p>

                <!-- Social Login Buttons -->
                <div class="auth-social-btns">
                    <button class="auth-social-btn"><i class="fa-brands fa-google"></i> Google</button>
                    <button class="auth-social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
                </div>

                <div class="auth-separator">or sign up with email</div>

                <form action="dashboard.html">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Min. 8 characters">
                    </div>
                    <div style="margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--secondary);">
                        <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" required
                                style="width: auto; margin-top: 0.2rem; accent-color: var(--accent);">
                            I agree to the <a href="#" style="color: var(--accent); font-weight: 500;">Terms of
                                Service</a> and <a href="#" style="color: var(--accent); font-weight: 500;">Privacy
                                Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;"><i
                            class="fa-solid fa-user-plus"></i> Create Account</button>
                </form>

                <div class="auth-links">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
